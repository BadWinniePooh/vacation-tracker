# Public deployment with Traefik reverse proxy and automatic Let's Encrypt TLS.
#
# Required extra env vars in .env (see .env.example):
#   DOMAIN      — public hostname, e.g. atlas.example.com
#   ACME_EMAIL  — contact address for Let's Encrypt certificate notifications
#
# Usage:
#   docker compose -f docker-compose.traefik.yml up -d

services:
  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      # Redirect all HTTP → HTTPS
      - --entrypoints.web.http.redirections.entrypoint.to=websecure
      - --entrypoints.web.http.redirections.entrypoint.scheme=https
      # Let's Encrypt via HTTP-01 challenge
      - --certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    # No direct port mapping — all traffic flows through Traefik.
    # The app port is never exposed to the internet; only Traefik reaches it
    # on the internal Docker network.
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 3000
      SESSION_SECRET: ${SESSION_SECRET}
      APP_PASSWORD_HASH: ${APP_PASSWORD_HASH}
    labels:
      - traefik.enable=true
      - traefik.http.routers.atlas.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.atlas.entrypoints=websecure
      - traefik.http.routers.atlas.tls.certresolver=letsencrypt
      - traefik.http.services.atlas.loadbalancer.server.port=3000
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  letsencrypt:
