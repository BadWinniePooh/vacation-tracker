name: Docker Build & Security Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    name: Build image and scan for vulnerabilities
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF results to GitHub Security

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: vacation-tracker:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container runs as non-root
        run: |
          USER_ID=$(docker run --rm --entrypoint id vacation-tracker:ci -u)
          echo "Container UID: $USER_ID"
          if [ "$USER_ID" = "0" ]; then
            echo "ERROR: container is running as root (UID 0)"
            exit 1
          fi
          echo "OK: container runs as non-root (UID $USER_ID)"

      - name: Scan image with Trivy (CRITICAL + HIGH CVEs)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: vacation-tracker:ci
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"       # fail the build on CRITICAL/HIGH findings
          ignore-unfixed: true # only report issues that have a fix available

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()           # upload even when trivy exits non-zero
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
